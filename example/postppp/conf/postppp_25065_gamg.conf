prcopt.eratio1      =200
prcopt.eratio2      =200
prcopt.eratio5      =300
prcopt.errphase     =0.003           # (m)
prcopt.errphaseel   =0.003      # (m)
prcopt.errphasebl   =0          # (m/10km)
prcopt.errdoppler   =1          # (Hz)
prcopt.snrmax       =52         # (dB.Hz)
prcopt.errsnr       =0          # (m)
prcopt.errrcv       =0          # ( )
prcopt.stdbias      =30         # (m)
prcopt.stdiono      =0.03       # (m)
prcopt.stdtrop      =0.3        # (m)
prcopt.prnaccelh    =10         # (m/s^2)
