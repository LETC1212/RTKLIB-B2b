# this is B2bPPP pppoost options(2025-3-1)
# Updated: 2025-12-04 - Added AR (Ambiguity Resolution) support

PPP_Glo.RT_flag   =0    #0:POST 1:Real-time

# prcopt_t prcopt
prcopt.mode       =7    # 0:single, 1:dgps, 2:kinematic, 3:static, 4:movingbase, 5:mobeb, 6:fixed, 7:ppp-kine, 8:ppp-static, 9:ppp-fixed
prcopt.navsys     =33    # (1:gps+2:sbas+4:glo+8:gal+16:qzs+32:comp)
prcopt.sateph     =5    # (0:brdc,1:precise,2:brdc+sbas,3:brdc+ssrapc,4:brdc+ssrcom, 5:brdc+PPP-B2b)
prcopt.nf         =2    # (1:l1,2:l1+l2,3:l1+l2+l5)
prcopt.elmin      =3    # (deg)
prcopt.snrmask_L1    =38,38,38,38,38,38,38,38,38
prcopt.snrmask_L2    =38,38,38,38,38,38,38,38,38
prcopt.snrmask_L5    =38,38,38,38,38,38,38,38,38
prcopt.snrmask_r     =0          # (0:off,1:on) must follow the value of snrmask_L
prcopt.snrmask_b     =0          # (0:off,1:on)
prcopt.exclsats      =    # (prn ... "+G01" will be set 2)
prcopt.ionoopt    =3    # (0:off,1:brdc,2:sbas,3:dual-freq,4:est-stec)
prcopt.tropopt    =3    # (0:off,1:saas,2:sbas,3:est-ztd,4:est-ztdgrad)
prcopt.tidecorr   =3    # (0:off,7:on)
prcopt.dynamics   =0    # (0:off,1:on)
prcopt.posopt[0]  =1    # SatPCV(0:off,1:on)
prcopt.posopt[1]  =1    # RecPCV(0:off,1:on)
prcopt.posopt[2]  =1    # phWU(0:off,1:on)
prcopt.posopt[3]  =1    # RejEcl(0:off,1:on)
prcopt.posopt[4]  =1    # RAIMFDE(0:off,1:on)
prcopt.posopt[5]  =1    # DBCorr(0:off,1:on)
prcopt.anttype[0] =*    # such as:LEIAR25         LEIT
prcopt.sp3sampling    =30 #(s)

# Ambiguity Resolution (AR) options for PPP-B2b fixed solution
# modear: 0=off, 1=continuous, 2=instantaneous, 3=fix-and-hold, 4=ppp-ar
# For PPP-B2b with day-to-day differencing, use modear=4
prcopt.modear     =4    # AR mode (0:off,1:continuous,2:instantaneous,3:fix-and-hold,4:ppp-ar)
prcopt.minlock    =30   # minimum lock count to fix ambiguity (epochs)
prcopt.minfixsats =4    # minimum satellites for AR
prcopt.thresar[0] =3.0  # AR ratio test threshold


# solopt_t solopt
solopt.posf       =0        # (0:llh,1:xyz,2:enu,3:nmea)
solopt.outhead        =0        # (0:off,1:on)
solopt.outopt         =0        # (0:off,1:on)
solopt.outvel         =0        # (0:off,1:on)
solopt.times        =0       # (0:gpst,1:utc,2:jst)
solopt.timef      =1        # (0:tow,1:hms)
solopt.timeu      =3
solopt.degform        =0        # (0:deg,1:dms)
solopt.fieldsep       =
prcopt.outsingle      =0        # (0:off,1:on)
solopt.maxsolstd      =0          # (m)
solopt.height         =0 # (0:ellipsoidal,1:geodetic)
solopt.geoid          =0   # (0:internal,1:egm96,2:egm08_2.5,3:egm08_1,4:gsi2000)
solopt.solstatic      =0        # (0:all,1:single)
solopt.nmeaintv1      =0          # (s)
solopt.nmeaintv2      =0          # (s)
solopt.outstat        =2      # (0:off,1:state,2:residual)
solopt.trace          =0    # debug trace level (0:off,8:debug lv7)


# infile list
# For day-to-day differencing AR with 7 input files:
# infile0-1: 2 days of observation files (RINEX observation)
# infile2-4: 3 days of navigation files (broadcast ephemeris)
# infile5-6: 2 days of B2b correction files
#
# IMPORTANT: postppp processes files sequentially in the order listed below.
# The day-boundary detection in ppp_ar.c automatically detects when DOY changes.
#
# Observation files (2 days required for AR)
infile0 = /home/book/GNSS/Open_Dataset/Post-processing_PPP_dataset/Obs/gamg0650.25h
infile1 = /home/book/GNSS/Open_Dataset/Post-processing_PPP_dataset/Obs/gamg0660.25h

# Navigation files (3 days recommended: day before, day 1, day 2)
# Including the day before helps ensure ephemeris availability at midnight boundary
infile2 = /home/book/GNSS/Open_Dataset/Post-processing_PPP_dataset/Nav/brd40640.25p
infile3 = /home/book/GNSS/Open_Dataset/Post-processing_PPP_dataset/Nav/brd40650.25p
infile4 = /home/book/GNSS/Open_Dataset/Post-processing_PPP_dataset/Nav/brd40660.25p

# PPP-B2b correction files (2 days required)
infile5 = /home/book/GNSS/Open_Dataset/Post-processing_PPP_dataset/PPP-B2b(Unicore)/2025065.B2b
infile6 = /home/book/GNSS/Open_Dataset/Post-processing_PPP_dataset/PPP-B2b(Unicore)/2025066.B2b
prcopt.B2b_format = 21  # 0:No B2b 20:sinan 21:unicore

# Note: For optimal AR performance:
# - Observation files must span at least 2 consecutive days
# - Navigation files should cover all observation days (recommend +1 day margin)
# - B2b files must match observation days
# - Ensure continuous satellite tracking across the day boundary


# outfile
outfile = ./out/2025065_GAMG.pos



# filopt_t filopt
filopt.satantp    =./conf/igs20_2350.atx
filopt.rcvantp    =./conf/igs20_2350.atx
filopt.blq        =./conf/ocnload_241227.blq
filopt.tempdir    =../../../../../temp


