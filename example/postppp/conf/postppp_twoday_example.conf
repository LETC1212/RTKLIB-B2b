# PPP-B2b Fixed Solution Configuration for Two-Day Processing
# This configuration supports day-to-day ambiguity resolution
# Based on Xi et al., 2021 - Pass-by-Pass Ambiguity Resolution Method
#
# Input files required (7 files total):
#   infile0: Day 302 observation file (RINEX)
#   infile1: Day 303 observation file (RINEX)
#   infile2: Day 302 broadcast ephemeris
#   infile3: Day 303 broadcast ephemeris
#   infile4: Day 304 broadcast ephemeris (for next day coverage)
#   infile5: Day 302 PPP-B2b correction file
#   infile6: Day 303 PPP-B2b correction file

# PPP Global Flags
PPP_Glo.RT_flag   =0    # 0:POST-processing 1:Real-time

# Processing Options (prcopt_t)
prcopt.mode       =7    # 0:single, 1:dgps, 2:kinematic, 3:static, 4:movingbase, 5:mobeb, 6:fixed, 7:ppp-kine, 8:ppp-static, 9:ppp-fixed
prcopt.navsys     =33   # (1:gps+2:sbas+4:glo+8:gal+16:qzs+32:comp) => 33=GPS+BDS
prcopt.sateph     =5    # (0:brdc,1:precise,2:brdc+sbas,3:brdc+ssrapc,4:brdc+ssrcom, 5:brdc+PPP-B2b)
prcopt.nf         =2    # (1:l1,2:l1+l2,3:l1+l2+l5)
prcopt.elmin      =15   # elevation mask angle (deg) - increased for AR
prcopt.snrmask_L1    =38,38,38,38,38,38,38,38,38
prcopt.snrmask_L2    =38,38,38,38,38,38,38,38,38
prcopt.snrmask_L5    =38,38,38,38,38,38,38,38,38
prcopt.snrmask_r     =0          # (0:off,1:on) must follow the value of snrmask_L
prcopt.snrmask_b     =0          # (0:off,1:on)
prcopt.exclsats      =    # (prn ... "+G01" will be set 2)
prcopt.ionoopt    =3    # (0:off,1:brdc,2:sbas,3:dual-freq,4:est-stec)
prcopt.tropopt    =3    # (0:off,1:saas,2:sbas,3:est-ztd,4:est-ztdgrad)
prcopt.tidecorr   =3    # (0:off,7:on)
prcopt.dynamics   =0    # (0:off,1:on)
prcopt.posopt[0]  =1    # SatPCV(0:off,1:on)
prcopt.posopt[1]  =1    # RecPCV(0:off,1:on)
prcopt.posopt[2]  =1    # phWU(0:off,1:on)
prcopt.posopt[3]  =1    # RejEcl(0:off,1:on)
prcopt.posopt[4]  =1    # RAIMFDE(0:off,1:on)
prcopt.posopt[5]  =1    # DBCorr(0:off,1:on)
prcopt.anttype[0] =*    # such as:LEIAR25         LEIT
prcopt.sp3sampling    =30 #(s)

# Ambiguity Resolution Options
prcopt.modear     =1    # AR mode: 0:off, 1:continuous, 2:instantaneous, 3:fix-and-hold
                        # Set to 1 or 3 to enable day-to-day AR

# Solution Options (solopt_t)
solopt.posf       =0        # (0:llh,1:xyz,2:enu,3:nmea)
solopt.outhead        =0        # (0:off,1:on)
solopt.outopt         =0        # (0:off,1:on)
solopt.outvel         =0        # (0:off,1:on)
solopt.times        =0       # (0:gpst,1:utc,2:jst)
solopt.timef      =1        # (0:tow,1:hms)
solopt.timeu      =3
solopt.degform        =0        # (0:deg,1:dms)
solopt.fieldsep       =
prcopt.outsingle      =0        # (0:off,1:on)
solopt.maxsolstd      =0          # (m)
solopt.height         =0 # (0:ellipsoidal,1:geodetic)
solopt.geoid          =0   # (0:internal,1:egm96,2:egm08_2.5,3:egm08_1,4:gsi2000)
solopt.solstatic      =0        # (0:all,1:single)
solopt.nmeaintv1      =0          # (s)
solopt.nmeaintv2      =0          # (s)
solopt.outstat        =2      # (0:off,1:state,2:residual) - output residuals for debugging
solopt.trace          =3    # debug trace level (0:off, 3:info, 5:debug) - increased for AR debugging


# Input Files (7 files for two-day processing)
# Day 302 (e.g., 2025-10-29)
infile0 = /path/to/data/obs/station3020.25o      # Day 302 observation
infile2 = /path/to/data/nav/brd43020.25p         # Day 302 broadcast ephemeris

# Day 303 (e.g., 2025-10-30)
infile1 = /path/to/data/obs/station3030.25o      # Day 303 observation
infile3 = /path/to/data/nav/brd43030.25p         # Day 303 broadcast ephemeris

# Day 304 (for next day coverage)
infile4 = /path/to/data/nav/brd43040.25p         # Day 304 broadcast ephemeris

# PPP-B2b Correction Files
infile5 = /path/to/data/b2b/2025302.B2b          # Day 302 B2b corrections
infile6 = /path/to/data/b2b/2025303.B2b          # Day 303 B2b corrections

# B2b Format Configuration
prcopt.B2b_format = 21  # 0:No B2b 20:sinan 21:unicore

# Output Files
outfile = ./out/twoday_fixed_solution.pos


# File Options (filopt_t)
filopt.satantp    =./conf/igs20_2350.atx
filopt.rcvantp    =./conf/igs20_2350.atx
filopt.blq        =./conf/ocnload_241227.blq
filopt.tempdir    =../../../../../temp


# Statistics Options
prcopt.eratio1      =200
prcopt.eratio2      =200
prcopt.eratio5      =300
prcopt.errphase     =0.003           # (m) carrier phase error
prcopt.errphaseel   =0.003      # (m)
prcopt.errphasebl   =0          # (m/10km)
prcopt.errdoppler   =1          # (Hz)
prcopt.snrmax       =52         # (dB.Hz)
prcopt.errsnr       =0          # (m)
prcopt.errrcv       =0          # ( )
prcopt.stdbias      =30         # (m) initial std dev of bias
prcopt.stdiono      =0.03       # (m)
prcopt.stdtrop      =0.3        # (m)
prcopt.prnaccelh    =10         # (m/s^2)
prcopt.prnaccelv    =10         # (m/s^2)
prcopt.prnbias      =0          # (m)
prcopt.prniono      =100        # (m)
prcopt.prntrop      =0.0001     # (m)
prcopt.prnpos       =0          # (m)
prcopt.clkstab      =5e-12      # (s/s)
prcopt.slipthres     =0.05       # (m)
prcopt.dopthres      =0          # (m)
prcopt.rejionno      =30        # (m)
prcopt.rejcode       =30        # (m)

# IMPORTANT NOTES:
# ================
# 1. Day-to-Day Ambiguity Resolution:
#    - The first day (302) will establish float ambiguity parameters
#    - The second day (303) will use day-to-day differencing to fix ambiguities
#    - Requires prcopt.modear != 0 (set to 1 or 3 for AR)
#
# 2. Clock Products:
#    - Fixed solution clock parameters will be output in $CLK records
#    - Look for solution status = 1 (SOLQ_FIX) in output
#    - Clock bias will be updated after ambiguity fixing
#
# 3. File Naming Convention:
#    - Replace 'station' with your actual station name (4 chars)
#    - Replace '302', '303', '304' with actual day-of-year
#    - Replace '25' with actual year (e.g., 25 for 2025)
#    - Example: gamg3020.25o for GAMG station on day 302 of 2025
#
# 4. Minimum Requirements:
#    - At least 4 satellites with lock count >= 10 epochs
#    - Elevation >= 15 degrees
#    - Time difference between days ~24 hours (86400s ± 1 hour)
#
# 5. Output Interpretation:
#    - stat=1: Fixed solution (ambiguities resolved)
#    - stat=2: Float solution (PPP float)
#    - stat=5: Single point solution
#    - ratio: ratio test value (>3.0 recommended for reliable fix)
